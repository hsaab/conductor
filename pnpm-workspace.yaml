# pnpm v11 reads settings from this file (the `pnpm` field in package.json is
# no longer honored). Two things are configured here:
#
# 1. ignoredBuiltDependencies — neither package's native/postinstall build is
#    needed by conductor (tsx bundles its own esbuild; sqlite3 is a transitive
#    dep we never load), so we intentionally skip those build scripts.
# 2. verifyDepsBeforeRun: false — stops `pnpm test` from running an implicit
#    install/deps check first, which in this environment aborts the test run.
ignoredBuiltDependencies:
  - esbuild
  - sqlite3
verifyDepsBeforeRun: false
